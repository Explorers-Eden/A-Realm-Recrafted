database.dialogues.villager.jungle.291: "The parrots stopped talking. Something\u2019\
  s wrong."
database.dialogues.villager.jungle.183: That tree ate our last cartographer.
database.dialogues.villager.jungle.184: Don't laugh at the idol. It notices.
database.dialogues.villager.jungle.160: You ever hear the trees laugh?
database.dialogues.villager.jungle.170: "Don't sleep under canopy\u2014dreams get\
  \ stuck."
database.dialogues.villager.jungle.171: "We don\u2019t grow wheat\u2014we grow warnings."
database.dialogues.villager.jungle.173: "You got melon seeds? Let\u2019s talk."
database.dialogues.villager.jungle.172: "That wasn\u2019t lightning. That was something\
  \ *worse*."
database.dialogues.villager.jungle.281: Watch your back near the glowshrooms.
database.dialogues.villager.jungle.198: We lose more traders than we gain.
database.dialogues.villager.jungle.161: If you dig at night, dig fast.
database.dialogues.villager.jungle.162: A parrot once told me my future.
database.dialogues.villager.jungle.280: "We don\u2019t use doors\u2014we use warnings."
database.dialogues.villager.jungle.282: "I don\u2019t trust anyone who walks straight."
database.dialogues.villager.jungle.194: "We never say the witch\u2019s name aloud."
database.dialogues.villager.jungle.199: That bridge only appears at sunset.
database.dialogues.villager.jungle.195: That emerald is humming.
database.dialogues.villager.jungle.196: Every root has a secret.
database.dialogues.villager.jungle.197: "The trees bend when no one\u2019s watching."
database.dialogues.villager.jungle.192: When it rains green, stay inside.
database.dialogues.villager.jungle.193: Some parrots speak in riddles.
database.dialogues.villager.jungle.283: "Don\u2019t point at the stone face."
database.dialogues.villager.jungle.188: I once met a skeleton who could sing.
database.dialogues.villager.jungle.271: "Trade quickly\u2014something\u2019s watching."
database.dialogues.villager.jungle.180: "Don\u2019t mine too long under the old temple."
database.dialogues.villager.jungle.163: The oldest vines grow over graves.
database.dialogues.villager.jungle.308: "Can you build a nether portal hut so we don\u2019\
  t attract piglins?"
database.dialogues.villager.jungle.260: The jungle's awake now.
database.dialogues.villager.jungle.177: Our well is deep enough to find echoes.
database.dialogues.villager.jungle.175: If the parrots leave, so should you.
database.dialogues.villager.jungle.273: "That\u2019s not fog\u2014it\u2019s spores."
database.dialogues.villager.jungle.154: My brother traded with a tree once.
database.dialogues.villager.jungle.182: If it looks like a melon and growls, run.
database.dialogues.villager.jungle.186: "If you see fog, don\u2019t move."
database.dialogues.villager.jungle.329: Can you carve me a cave home behind the waterfall?
database.dialogues.villager.jungle.306: "A raised hut would be great\u2014ground\u2019\
  s too soggy."
database.dialogues.villager.jungle.294: The vines are listening.
database.dialogues.villager.jungle.296: The canopy saw what you did.
database.dialogues.villager.jungle.290: Don't eat the purple mushrooms.
database.dialogues.villager.jungle.304: Can you make a bamboo fence to keep out ocelots?
database.dialogues.villager.jungle.292: "You feel heavier here, don\u2019t you?"
database.dialogues.villager.jungle.150: "Don\u2019t wear gold near the sacred grove."
database.dialogues.villager.jungle.152: "The temple doesn\u2019t like loud footsteps."
database.dialogues.villager.jungle.298: "Your torch just flickered\u2014run."
database.dialogues.villager.jungle.263: "The parrots told me you\u2019d come."
database.dialogues.villager.jungle.251: The jungle always reclaims what it lends.
database.dialogues.villager.jungle.168: "You\u2019re not lost. The jungle just moved."
database.dialogues.villager.jungle.328: "Let\u2019s build a little caf\xE9. Jungle\
  \ smoothies, maybe?"
database.dialogues.villager.jungle.327: A tall watchtower would help spot pillagers
  from miles away.
database.dialogues.villager.jungle.207: My cousin lives in a tree now.
database.dialogues.villager.jungle.274: You blinked. The vines moved.
database.dialogues.villager.jungle.179: The water runs uphill sometimes.
database.dialogues.villager.jungle.262: "Don\u2019t say your name near the shrine."
database.dialogues.villager.jungle.145: I saw a witch walk through a wall.
database.dialogues.villager.jungle.275: I saw an eye open on a tree once.
database.dialogues.villager.jungle.131: The jungle chooses who gets out.
database.dialogues.villager.jungle.339: Put some banners up! Our village needs flair.
database.dialogues.villager.jungle.130: Bring melons, not questions.
database.dialogues.villager.jungle.134: I saw an Enderman climb a vine.
database.dialogues.villager.jungle.285: The jungle accepts, but it never forgets.
database.dialogues.villager.jungle.206: "Don\u2019t look directly at the stone heads."
database.dialogues.villager.jungle.146: The jungle heals itself, but not us.
database.dialogues.villager.jungle.313: "Build a little hut for brewing\u2014there\u2019\
  s magic in the jungle!"
database.dialogues.villager.jungle.289: "The jungle likes you\u2014for now."
database.dialogues.villager.jungle.141: You see those ruins? Neither do I.
database.dialogues.villager.jungle.142: I traded emeralds for silence once.
database.dialogues.villager.jungle.286: "Don\u2019t rest beneath twisted roots."
database.dialogues.villager.jungle.111: The canopy watches, always.
database.dialogues.villager.jungle.169: "That\u2019s not a monkey. That\u2019s something\
  \ else."
database.dialogues.villager.jungle.252: You bring silence? Good.
database.dialogues.villager.jungle.165: The temple door only opens to silence.
database.dialogues.villager.jungle.312: "I want a ladder system\u2014stairs are too\
  \ old-school."
database.dialogues.villager.jungle.229: "I don\u2019t trade after dusk\u2014not anymore."
database.dialogues.villager.jungle.191: That chest was full an hour ago.
database.dialogues.villager.jungle.190: You built with jungle wood? Brave.
database.dialogues.villager.jungle.316: Make me a waterfall hideout. Just trust me.
database.dialogues.villager.jungle.317: "A jungle bathhouse would be awesome\u2014\
  vines and all."
database.dialogues.villager.jungle.255: The parrots fly in circles when danger comes.
database.dialogues.villager.jungle.335: Build me a vine-covered tower. A tall one.
  Epic.
database.dialogues.villager.jungle.112: "That mossy stone wasn\u2019t cracked yesterday."
database.dialogues.villager.jungle.100: "Careful where you step\u2014some vines bite\
  \ back."
database.dialogues.villager.jungle.347: I want a mossy meditation platform under the
  moonlight.
database.dialogues.villager.jungle.176: "Some vines hum with energy\u2014avoid those."
database.dialogues.villager.jungle.164: I saw a pig disappear into the fog.
database.dialogues.villager.jungle.267: We all have stories. The jungle has more.
database.dialogues.villager.jungle.244: We lost a farmer to a tree once.
database.dialogues.villager.jungle.203: Don't step near the hollow logs.
database.dialogues.villager.jungle.270: "You can\u2019t escape the roots."
database.dialogues.villager.jungle.324: "Add a wooden signpost\u2014I keep looping\
  \ in circles."
database.dialogues.villager.jungle.187: "We don\u2019t plant\u2014things grow on their\
  \ own."
database.dialogues.villager.jungle.233: "That idol\u2019s eyes follow travelers."
database.dialogues.villager.jungle.108: You smell like you've been to a dungeon.
database.dialogues.villager.jungle.278: You better hope that wasn't sacred.
database.dialogues.villager.jungle.293: "That sound means the temple\u2019s waking."
database.dialogues.villager.jungle.218: That golem left footprints upward.
database.dialogues.villager.jungle.301: "I need a bridge across that river\u2014I\u2019\
  m tired of swimming."
database.dialogues.villager.jungle.309: "I\u2019d like a quiet meditation spot near\
  \ the parrots."
database.dialogues.villager.jungle.305: "We need a proper dock\u2014boats keep floating\
  \ away."
database.dialogues.villager.jungle.123: "Spiders in the canopy don\u2019t drop string."
database.dialogues.villager.jungle.127: You ever been chased by your own shadow?
database.dialogues.villager.jungle.157: We follow the vines, not the path.
database.dialogues.villager.jungle.240: That axe is too loud for this place.
database.dialogues.villager.jungle.210: "Trade quickly\u2014the moss doesn\u2019t\
  \ wait."
database.dialogues.villager.jungle.153: Every ruin has a purpose, even broken ones.
database.dialogues.villager.jungle.297: You hear the footsteps too?
database.dialogues.villager.jungle.214: You dream of vines yet?
database.dialogues.villager.jungle.128: "That\u2019s not mud\u2014it\u2019s memory."
database.dialogues.villager.jungle.343: I need a hidden nook for enchanting. Very
  hush-hush.
database.dialogues.villager.jungle.116: You brought cocoa? Now *you* can stay.
database.dialogues.villager.jungle.331: "I need a treetop sleeping pod\u2014no more\
  \ creeper wake-ups!"
database.dialogues.villager.jungle.248: Some trees are older than the moon.
database.dialogues.villager.jungle.104: Cookies are the only way to make friends here.
database.dialogues.villager.jungle.247: The vines grow better with blood.
database.dialogues.villager.jungle.223: "If it glows, it\u2019s claimed."
database.dialogues.villager.jungle.200: Did the vines just move toward you?
database.dialogues.villager.jungle.139: "That\u2019s not a pond\u2014it\u2019s a trap."
