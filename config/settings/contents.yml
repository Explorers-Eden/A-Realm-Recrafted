                - '

                  And may their songs echo, forever along.'
                text: So let us give thanks, for the merchant so kind,
            - raw:
                extra:
                - '

                  Bringing the world closer, standing proud and tall.'
                - '

                  A symbol of hope, a beacon so bright,'
                - '

                  Guiding us onward, with their unwavering light.'
                text: For the wandering merchant, a gift to us all,
            resolved: 1
            title:
              raw: Song for the Wandering Merchant
            author: Rowan
      slot: 20
    - item:
        id: minecraft:written_book
        count: 1
        components:
          minecraft:written_book_content:
            pages:
            - raw: "It all started with a simple question: Should we change the name\
                \ of our village? Florencia. It wasn't a bad name, but some villagers\
                \ felt it lacked\u2026 pizzazz. Old Man Fitzwilliam, bless his heart,\
                \ started it all. "
            - raw: 'He planted a sign in the village square. ''New Name: Eldoria!''
                it proclaimed.'
            - raw: "The next morning, a new sign appeared next to Fitzwilliam\u2019\
                s. 'Eldoria? Too elven!' it read, in Butcher Beatrice\u2019s bold\
                \ scrawl. Then came another: 'How about\u2026 Carrotville?' from Farmer\
                \ Giles, naturally. "
            - raw: Librarian Leo countered with 'Bibliopolis,' while Fletcher Fiona
                suggested 'Arrow Creek.'
            - raw: 'The village square, usually a place of calm trading and golem-patrolling,
                became a chaotic marketplace of ideas. Signs sprouted like weeds.
                ''Rockham!'' '
            - raw: '''Sunnyside!'' ''Ironville!'' Every villager had a suggestion,
                and every suggestion had a counter-suggestion, often scrawled on the
                back of the original sign, or on a new one placed precariously close.'
            - raw: "Discussions raged. 'Carrotville? Are you mad, Giles?' 'Bibliopolis?\
                \ Too\u2026 bookish!' 'Arrow Creek? Do we only make arrows?' The air\
                \ crackled not with tension, "
            - raw: but with the scratching of charcoal on wood and the murmur of villagers
                debating the merits of 'Golemtown' versus 'Wheatfield.'
            - raw: The iron golem, bless its metallic heart, just tilted its head
                and occasionally let out a confused clang. Even the nitwit children
                joined in, scribbling nonsensical symbols and giggling.
            - raw: 'The sign proliferation was exponential. They climbed the well,
                leaned against the houses, and even obscured the golem at one point.
                The village square was no longer a square, but a labyrinth of wooden
                pronouncements. '
            - raw: We villagers could barely move without bumping into a sign advocating
                for 'Pigtopia' or 'Crystal Caverns.'
            - raw: 'The chaos reached its peak when someone suggested ''Signville.''
                This sparked a furious debate about the irony of naming a village
                after its current predicament. '
            - raw: The signs multiplied, each one arguing for or against 'Signville,'
                until the entire village was practically buried under a mountain of
                wood and charcoal.
            - raw: "We couldn\u2019t see the sky. We couldn\u2019t see each other.\
                \ We could barely breathe. Florencia, or whatever it was supposed\
                \ to be called, had become a monument to indecision."
            - raw: Finally, after what felt like an eternity, the village elder, bless
                her wise soul, climbed to the top of the sign mountain (with the golem's
                help, of course). She cleared her throat, and her voice echoed through
                the narrow sign-canyons.
            - raw:
                extra:
                - '

                  Silence fell. Every villager, peeking out from behind their signs,
                  waited with bated breath.'
                text: '''Enough!'' she declared.'
            - raw: '''We have spent days, weeks even, arguing about this,'' the elder
                continued. ''We have covered our village in signs. We have debated
                every possible name. And what have we achieved?'''
            - raw:
                extra:
                - "\n\n'Nothing,' she answered herself. 'Absolutely nothing. We are\
                  \ still\u2026 Florencia.'"
                text: She paused, letting the question hang in the air.
            - raw:
                extra:
                - '

                  Then, Farmer Giles, ever practical, spoke up. ''Well,'' he said,
                  ''at least we got it out of our systems.'''
                text: A collective sigh swept through the village. The elder was right.
                  All that effort, all those signs, and we were right back where we
                  started.
            - raw: And so, we began the long process of removing the signs. It took
                days. We stacked them, burned some, and repurposed others. Slowly,
                Florencia emerged from its wooden tomb.
            - raw: And the name? It stayed Florencia. After all, it wasn't so bad.
                And besides, we were all too tired to think of anything else.
            - raw: So that's the story of the Marker Incident of Florencia. A reminder
                that sometimes, the best name is the one you already have. And that
                villagers, given enough charcoal and wood, can create a truly magnificent
                mess.
            resolved: 1
            title:
              raw: The Marker Incident of Florencia
            author: Xi
      slot: 21
    - item:
        id: minecraft:written_book
        count: 1
        components:
          minecraft:written_book_content:
            pages:
            - raw: Well met, traveler! Gather 'round and lend an ear to the tale of
                Bartholomew the Librarian, and the most peculiar sheep this village
                has ever seen. Now, me, I've been behind this lectern for more moons
                than I can count. Seen countless trades, barters gone wrong with pillagers,
            - raw: even the occasional hero stoppin' by for a good ol' enchanted sword.
                But nothin' coulda prepared me for the day Humphrey the Shepherd came
                bustin' through the library doors, eyes wide as melons.
            - raw:
                extra:
                - '

                  Now, Humphrey''s a good lad, dependable as the sunrise. But him
                  panickin''? That was rarer than a diamond pickaxe.'
                text: '''Bartholomew!'' he hollered, voice shakin'' like a leaf in
                  a storm. ''Bartholomew, you gotta come see this!'''
            - raw: "Curiosity gnawed at me somethin' fierce, so I shut the book I\
                \ was readin' \u2013 somethin' about the history of redstone, fascinating\
                \ stuff \u2013 and followed Humphrey out into the crisp mornin' air."
            - raw: We hurried past the blacksmith's clangin' hammer, past the baker's
                sweet-smelling stall, until we reached the grassy plains beyond the
                village walls. There, amongst the usual flock of white as snow sheep,
                stood one... different.
            - raw: Its wool wasn't the usual snowy white, mind you. No, this sheep's
                coat was the color of a sunset after a rain shower, a soft, gentle
                pink that seemed to glow in the mornin' light. Humphrey gaped at it,
                then at me, then back at the sheep.
            - raw:
                extra:
                - '

                  I knelt down, mesmerized.  In all my years, I''d never seen such
                  a sight. It was like somethin'' out of a dusty fable book, a creature
                  of pure wonder.'
                text: '''Pink,'' he whispered, like he was afraid to say it too loud.
                  ''A pink sheep!'''
            - raw:
                extra:
                - '

                  Word spread through the village faster than a blaze through dry
                  wood. Soon, everyone was out starin'' at the pink wonder.'
                text: The other sheep seemed to be starin' at it too, a mix of confusion
                  and curiosity in their big, black eyes.
            - raw:
                extra:
                - '

                  Humphrey, ever the responsible one, built a little pen to keep the
                  pink sheep safe.'
                text: The children chased it around the field, giggling as its pink
                  wool flopped this way and that. Even Agnes, our grumpy old librarian
                  (bless her soul), cracked a smile.
            - raw: We named it Rosie, of course. It became the village mascot, a symbol
                of good luck and good fortune. We even started dyein' our wool pink
                in honor of Rosie, though nothin' could quite match the natural beauty
                of her coat.
            - raw: Rosie lived a long and happy life, grazin' in her pen and bringin'
                a smile to everyone's face. And me? Well, I added a whole new chapter
                to my history book, a tale of the day the wool turned funny, and the
                pink sheep that brought a little bit of magic to our village.
            title:
              raw: The Day the Wool Turned Funny
            author: Bartholomew the Librarian
