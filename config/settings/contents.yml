- Slot: 6
  id: minecraft:written_book
  count: 1
  components:
    minecraft:written_book_content:
      pages:
      - raw:
          extra:
          - '

            A tale I shall sing, a story to tell,'
          - '

            Of the merchant who wanders, across land and sea,'
          - '

            Bringing treasures to all, setting hearts free.'
          text: Hear now, ye villagers, and listen well,
      - raw:
          extra:
          - '

            Across mountains so high, and deserts so dry,'
          - '

            Through forests so deep, where shadows reside,'
          - '

            The wandering merchant, with nothing to hide.'
          text: From sunrise to sunset, their journey they ply,
      - raw:
          extra:
          - '

            Your stories and wares, are worth more than gold.'
          - '

            By air, by water, by land you do roam,'
          - '

            Bringing joy to our villages, making them home.'
          text: Oh, merchant, oh, merchant, so brave and so bold,
      - raw:
          extra:
          - '

            Their carts laden with goods, easing our pains.'
          - '

            With emeralds so green, and diamonds so bright,'
          - '

            They trade for our harvests, making all right.'
          text: On swift-winged llamas, they traverse the plains,
      - raw:
          extra:
          - '

            Their sacks full of wonders, fulfilling each will.'
          - '

            From potions that heal, to tools that create,'
          - '

            They bring us the means, to change our own fate.'
          text: On sturdy pack mules, they climb every hill,
