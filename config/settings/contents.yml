database.dialogues.villager.taiga.279: Frozen rivers mirror stars like mirrors of
  cold winter skies.
database.dialogues.villager.taiga.107: Beware the snowstorms; they can freeze even
  the bravest traveler.
database.dialogues.villager.taiga.158: Snow muffles sound, making the forest feel
  deep and secret.
database.dialogues.villager.taiga.109: Moss blankets the ground soft as a bed beneath
  towering pines.
database.dialogues.villager.taiga.321: I need a raised chicken coop. The foxes are
  relentless.
database.dialogues.villager.taiga.126: Wolves watch with shining eyes, curious but
  cautious of strangers.
database.dialogues.villager.taiga.325: Build a lookout shack with a map wall. Real
  explorer vibes.
database.dialogues.villager.taiga.122: Mossy stones peek through the snow, ancient
  and cold as the land.
database.dialogues.villager.taiga.241: Moss cushions steps and stones, soft and green
  beneath snow.
database.dialogues.villager.taiga.249: The scent of pine and frost fills the crisp
  winter morning.
database.dialogues.villager.taiga.266: Berries burst cold and sweet, a rare treat
  in frozen woods.
database.dialogues.villager.taiga.245: "Berries offer sweet life amidst the frozen\
  \ forest\u2019s grasp."
database.dialogues.villager.taiga.300: Can you build me a log cabin? Something warm
  with a chimney.
database.dialogues.villager.taiga.217: "Frozen rivers gleam under the pale winter\
  \ sun\u2019s light."
database.dialogues.villager.taiga.219: Snow muffles all sound, making the world feel
  hushed and still.
database.dialogues.villager.taiga.302: Mind putting up a tall totem pole? For decoration...
  and maybe bears.
database.dialogues.villager.taiga.211: The forest holds secrets in every snow-covered
  pine.
database.dialogues.villager.taiga.215: Icicles drip slowly, falling with a sharp snap
  now and then.
database.dialogues.villager.taiga.213: Snow crunches softly, marking the footsteps
  of travelers.
database.dialogues.villager.taiga.132: "Moss cushions your steps, softening the forest\u2019\
  s cold embrace."
database.dialogues.villager.taiga.144: Icicles hang heavy, waiting for the sun to
  send them crashing.
database.dialogues.villager.taiga.303: "Let\u2019s get a proper smokehouse going.\
  \ Jerky season\u2019s coming."
database.dialogues.villager.taiga.315: Mind building a fishing shack by the icy river?
database.dialogues.villager.taiga.208: Berries hidden beneath snow are treasures for
  patient foragers.
database.dialogues.villager.taiga.156: The scent of pine fills the cold air, fresh
  and alive.
database.dialogues.villager.taiga.264: Icicles drip slowly, frozen tears hanging from
  tree branches.
database.dialogues.villager.taiga.288: Owls hoot softly, their calls echoing through
  frozen trees.
database.dialogues.villager.taiga.120: Wolves travel in packs, moving swift and silent
  through the trees.
database.dialogues.villager.taiga.287: "The forest\u2019s cold breath settles heavy\
  \ on frost-covered earth."
database.dialogues.villager.taiga.143: Wolves howl in the distance, a haunting song
  of winter wilds.
database.dialogues.villager.taiga.133: Owls watch silently, eyes glowing like lanterns
  in the dark.
database.dialogues.villager.taiga.326: "I\u2019d love a tree stump throne. Feels right\
  \ for this biome."
database.dialogues.villager.taiga.209: The cold wind carries whispers of ancient forest
  spirits.
database.dialogues.villager.taiga.276: Wolves watch with glowing eyes, guardians of
  the snowy woods.
database.dialogues.villager.taiga.277: Berries hide under snowy leaves, a sweet reward
  for the patient.
database.dialogues.villager.taiga.338: "I\u2019d love a tall log cabin with a sleeping\
  \ loft."
database.dialogues.villager.taiga.110: The smell of pine and cold earth fills the
  crisp morning air.
database.dialogues.villager.taiga.166: Owls watch silently, their glowing eyes following
  every move.
database.dialogues.villager.taiga.205: The howl of wolves reminds us we share this
  frozen land.
database.dialogues.villager.taiga.349: "Surprise me\u2014but make it woodsy, warm,\
  \ and wolf-aware."
database.dialogues.villager.taiga.348: Can you make a big spruce tree in the square?
  For winter cheer.
database.dialogues.villager.taiga.284: Moss blankets stones like ancient blankets,
  soft and cold.
database.dialogues.villager.taiga.167: Icicles sparkle like diamonds in the pale winter
  sun.
database.dialogues.villager.taiga.314: "We need a lodge for travelers\u2014folks freeze\
  \ out there."
database.dialogues.villager.taiga.250: Wolves travel swift and silent, masters of
  the frozen wilds.
database.dialogues.villager.taiga.253: Mossy stones peek through snow, ancient and
  timeless as the land.
database.dialogues.villager.taiga.254: Icicles hang sharp and clear, waiting to fall
  with a snap.
database.dialogues.villager.taiga.319: A path of gravel and moss would help me not
  get lost.
database.dialogues.villager.taiga.318: I want a bell tower that echoes through the
  woods.
database.dialogues.villager.taiga.136: Berries hide under snowy leaves, a sweet reward
  for the patient.
database.dialogues.villager.taiga.295: Frozen rivers sparkle like glass, cold and
  clear in sunlight.
database.dialogues.villager.taiga.148: Frozen rivers reflect stars like mirrors of
  the cold night sky.
database.dialogues.villager.taiga.227: "The taiga\u2019s cold breath settles heavy\
  \ on the frost-covered ground."
database.dialogues.villager.taiga.140: "Pine needles crunch underfoot, singing of\
  \ the forest\u2019s quiet."
database.dialogues.villager.taiga.307: "Add some lantern posts\u2014the forest gets\
  \ dark."
database.dialogues.villager.taiga.322: "Let\u2019s put in a hot spring area\u2014\
  just warm water and rocks."
database.dialogues.villager.taiga.239: Frozen ponds sparkle, inviting brave feet to
  slide and skate.
database.dialogues.villager.taiga.189: Owls hoot softly, their calls echoing through
  frozen trees.
database.dialogues.villager.taiga.272: "The taiga\u2019s wild heart beats strong beneath\
  \ the frost and snow."
database.dialogues.villager.taiga.231: Logs stacked high keep the village warm through
  long winter nights.
database.dialogues.villager.taiga.174: Frozen ponds glisten like glass, inviting and
  dangerous alike.
database.dialogues.villager.taiga.333: I need a roofed walkway between buildings.
  Dry feet matter.
database.dialogues.villager.taiga.102: "Watch for wolves\u2014they run wild but might\
  \ just be curious."
database.dialogues.villager.taiga.337: Build a bear totem. No, not a real one. Yet.
database.dialogues.villager.taiga.106: Ice glistens on the needles, sparkling under
  the pale sun.
database.dialogues.villager.taiga.178: "Icicles drip slowly, nature\u2019s frozen\
  \ tears hanging from branches."
database.dialogues.villager.taiga.269: Frozen ponds sparkle, inviting brave hearts
  to glide and slide.
database.dialogues.villager.taiga.261: Logs crack and pop, filling the night with
  cozy warmth.
database.dialogues.villager.taiga.246: Icicles glisten like crystals in the pale winter
  sunlight.
database.dialogues.villager.taiga.181: Snowfall hushes the world, wrapping it in quiet
  white blankets.
database.dialogues.villager.taiga.242: The howl of wolves fills the cold night air
  with wild song.
database.dialogues.villager.taiga.185: "Wolves roam the taiga, swift shadows beneath\
  \ the moon\u2019s glow."
database.dialogues.villager.taiga.265: The scent of pine fills the cold air with freshness
  and life.
database.dialogues.villager.taiga.121: Logs crack and pop, filling the night with
  cozy warmth.
database.dialogues.villager.taiga.159: Wolves roam free, swift and silent beneath
  the winter moon.
database.dialogues.villager.taiga.155: "Icicles drip slowly, nature\u2019s frozen\
  \ tears hanging from the trees."
database.dialogues.villager.taiga.125: Berries feed the birds and travelers alike
  during long winters.
database.dialogues.villager.taiga.212: Wolves travel silently through the frozen underbrush.
database.dialogues.villager.taiga.216: The scent of pine fills the winter air, fresh
  and alive.
database.dialogues.villager.taiga.299: "Snow crunches underfoot, a melody of winter\u2019\
  s steady march."
database.dialogues.villager.taiga.129: Pine trees stand tall and proud, guardians
  of the cold wilderness.
database.dialogues.villager.taiga.151: Pinecones scatter like treasures waiting for
  the taking.
database.dialogues.villager.desert.291: I built a throne out of nothing. Just like
  hope.
database.dialogues.villager.desert.183: "You brought cake? We haven\u2019t had sugar\
  \ in years."
database.dialogues.villager.desert.184: "Let me guess\u2014you got lost?"
database.dialogues.villager.desert.160: "The sun doesn\u2019t rise\u2014it declares\
  \ war."
database.dialogues.villager.desert.170: Another one seeking treasure. Boring.
database.dialogues.villager.desert.171: Try not to sleep too close to the dunes.
database.dialogues.villager.desert.173: Everything here bites, including the wind.
database.dialogues.villager.desert.172: "You\u2019re lucky I\u2019m feeling generous.\
  \ And tired."
database.dialogues.villager.desert.281: "Yes, I talk to the sun. No, it doesn\u2019\
  t answer."
database.dialogues.villager.desert.198: The savanna villagers complain. Amateurs.
database.dialogues.villager.desert.161: "Ever tried fishing in sand? Don\u2019t."
database.dialogues.villager.desert.162: The wind is our music.
database.dialogues.villager.desert.280: I named all my chickens after former mayors.
database.dialogues.villager.desert.282: "My favorite food is sand. I\u2019m joking.\
  \ Mostly."
database.dialogues.villager.desert.194: Our children play with gravel. Builds toughness.
database.dialogues.villager.desert.199: You still here? Impressive.
database.dialogues.villager.desert.195: Ever seen a phantom cry? You will.
database.dialogues.villager.desert.196: Build your house from sandstone. Watch it
  crumble.
database.dialogues.villager.desert.197: "Furnaces run 24/7. Even when we don\u2019\
  t need them."
database.dialogues.villager.desert.192: We salt our food with crushed hopes.
database.dialogues.villager.desert.193: Sand is coarse, rough, and it gets everywhere.
database.dialogues.villager.desert.283: I made a hat from rabbit fur and cactus juice.
database.dialogues.villager.desert.188: Every villager here has a shovel and trauma.
database.dialogues.villager.desert.271: Ever seen bones in perfect rows?
database.dialogues.villager.desert.180: "Yes, I\u2019m dusty. No, I don\u2019t care."
database.dialogues.villager.desert.163: You look thirsty. You also look dumb.
database.dialogues.villager.desert.308: "I'd love a bigger house\u2014with two chests,\
  \ even!"
database.dialogues.villager.desert.260: "Some sand doesn\u2019t stay where you leave\
  \ it."
database.dialogues.villager.desert.177: "The sandstone remembers things I wish it\
  \ didn\u2019t."
database.dialogues.villager.desert.175: Our water is more precious than diamonds.
database.dialogues.villager.desert.273: No one survives three sandstorms in a row.
  Except me.
database.dialogues.villager.desert.154: "Some say the temple has traps. Others\u2026\
  \ never spoke again."
database.dialogues.villager.desert.182: You think trading is easy? Try it during a
  raid.
database.dialogues.villager.desert.186: "If you find bones, don\u2019t ask questions."
database.dialogues.villager.desert.329: Can you build a bakery? The smell alone would
  be worth it.
database.dialogues.villager.desert.306: A trading hall would be neat, yeah? With space
  for all of us!
database.dialogues.villager.desert.294: I think I dreamed you last night.
database.dialogues.villager.desert.296: This sand? Haunted.
database.dialogues.villager.desert.290: "Don\u2019t trust that sandstone block. It\
  \ judges."
database.dialogues.villager.desert.304: Mind putting up some lanterns? It gets real
  dark at night.
database.dialogues.villager.desert.292: Sometimes I float. Sometimes I scream.
database.dialogues.villager.desert.150: Seen any water? Me neither.
database.dialogues.villager.desert.152: You smell like overworld ambition.
database.dialogues.villager.desert.298: The phantoms and I are on speaking terms.
database.dialogues.villager.desert.263: I sleep with one eye open. The sand watches.
database.dialogues.villager.desert.251: Kindness, like water, is never wasted.
database.dialogues.villager.desert.168: I once had a dream. It died in a sandstorm.
database.dialogues.villager.desert.328: "I\u2019d love a window with glass\u2014not\
  \ just a hole."
database.dialogues.villager.desert.327: A sandstone arch would look amazing at the
  entrance!
database.dialogues.villager.desert.207: Sunshine is our default personality.
database.dialogues.villager.desert.274: The temple door only opens for blood. Probably
  kidding.
database.dialogues.villager.desert.179: "Our golem\u2019s cranky. Like me, but heavier."
database.dialogues.villager.desert.262: "The husks come early when the moon\u2019\
  s full."
database.dialogues.villager.desert.145: We used to have a librarian. Then the sand
  took him.
database.dialogues.villager.desert.275: "The sky\u2019s too quiet tonight."
database.dialogues.villager.desert.131: Is that a potion or just colored sadness?
database.dialogues.villager.desert.339: Ever thought about a little oasis with some
  chairs?
database.dialogues.villager.desert.130: The last person who rang our bell became a
  husk snack.
database.dialogues.villager.desert.134: Sleep here if you like waking up to arrows.
database.dialogues.villager.desert.285: This robe? Made it from sadness and wool.
database.dialogues.villager.desert.206: I once built a boat... in the sand. Still
  proud.
database.dialogues.villager.desert.146: "Acacia wood? That\u2019s a luxury here."
database.dialogues.villager.desert.313: "Our well\u2019s dry\u2014can you dig us a\
  \ new one?"
database.dialogues.villager.desert.289: Every sunrise resets my memory.
database.dialogues.villager.desert.141: "You breathe loud. Sand doesn\u2019t like\
  \ that."
database.dialogues.villager.desert.142: Ever eaten dry bread for 40 days straight?
database.dialogues.villager.desert.286: "I once married a cactus. We don\u2019t talk\
  \ about it."
database.dialogues.villager.desert.111: Another hot day in paradise.
database.dialogues.villager.desert.169: "The desert doesn\u2019t hate you\u2014it\
  \ just ignores you."
database.dialogues.villager.desert.252: Each footstep writes a story in the sand.
database.dialogues.villager.desert.165: Trading? Good. Begging? No.
database.dialogues.villager.desert.312: Got time to dig out a cellar for cool storage?
database.dialogues.villager.desert.229: "The desert\u2019s tough, but so are we."
database.dialogues.villager.desert.191: "I\u2019ve seen the End. It\u2019s cleaner\
  \ than this."
database.dialogues.villager.desert.190: "Your boots are full of sand. That\u2019s\
  \ normal."
database.dialogues.villager.desert.316: "I wouldn\u2019t say no to a little garden\
  \ with melons."
database.dialogues.villager.desert.317: Can you put a fence around the village? Y'know,
  for safety.
database.dialogues.villager.desert.255: The desert sees you long before you see it.
database.dialogues.villager.desert.335: Make a little campfire spot so we can swap
  stories.
database.dialogues.villager.desert.112: The sand remembers more than you think.
database.dialogues.villager.desert.100: Welcome to the sandpit we call life.
database.dialogues.villager.desert.347: "Make a tower of sand that won\u2019t fall.\
  \ Magic, basically."
database.dialogues.villager.desert.176: Every noise after dark is probably a mistake.
database.dialogues.villager.desert.164: "We don\u2019t farm for food. We farm for\
  \ survival."
database.dialogues.villager.desert.267: The wind howled last night. It used my name.
database.dialogues.villager.desert.244: Stillness is strength in the sands.
database.dialogues.villager.desert.203: "We may be dry, but we\u2019re not dull."
database.dialogues.villager.desert.270: I swear the dunes breathe sometimes.
database.dialogues.villager.desert.324: "I want a cozy reading nook. Don\u2019t ask\
  \ why."
database.dialogues.villager.desert.187: "Our cats are weird. They don\u2019t meow\u2014\
  they judge."
database.dialogues.villager.desert.233: "We plant hope like we plant crops\u2014deep\
  \ and careful."
database.dialogues.villager.desert.108: I once tried to ride a husk. It went poorly.
database.dialogues.villager.desert.278: "Something\u2019s moving under the sand."
database.dialogues.villager.desert.293: "I\u2019m not a villager. I\u2019m just really\
  \ committed."
database.dialogues.villager.desert.218: The sand sings lullabies if you listen right.
database.dialogues.villager.desert.301: "I need a better roof\u2014sand keeps falling\
  \ in my bed!"
database.dialogues.villager.desert.309: Can you make me a tiny lookout hut on that
  dune?
database.dialogues.villager.desert.305: "Think you could fix that broken house? It\u2019\
  s more hole than home."
database.dialogues.villager.desert.123: "We don\u2019t dig for treasure\u2014we survive."
database.dialogues.villager.desert.127: The oasis is a myth. Just like hope.
database.dialogues.villager.desert.157: "I\u2019ve seen creepers try to leave this\
  \ place."
database.dialogues.villager.desert.240: A single drop of water is more valuable than
  gold.
database.dialogues.villager.desert.210: The heat bakes the bread and my mood!
database.dialogues.villager.desert.153: "You\u2019re from the forest? Trees sound\
  \ exhausting."
database.dialogues.villager.desert.297: I once won a staring contest with a blaze.
database.dialogues.villager.desert.214: "Desert life? It\u2019s dry, but never boring."
database.dialogues.villager.desert.128: "You got sand in your boots? You\u2019ll get\
  \ used to it."
database.dialogues.villager.desert.343: I want a bench with a view. Somewhere to watch
  sunsets.
database.dialogues.villager.desert.116: "We don\u2019t get rain. We get disappointment."
database.dialogues.villager.desert.331: "Put a roof on the well\u2014I\u2019m tired\
  \ of falling in."
database.dialogues.villager.desert.248: Sometimes survival is the only wisdom you
  need.
database.dialogues.villager.desert.104: "Careful, that\u2019s not a mirage\u2014it\u2019\
  s my home."
database.dialogues.villager.desert.247: Endure long enough, and you become the storm.
database.dialogues.villager.desert.223: My crops grow slow, but they grow strong.
database.dialogues.villager.desert.200: The desert has sunsets that could make a ghast
  smile.
database.dialogues.villager.desert.139: "I\u2019ve seen Endermen blink. At me."
database.dialogues.villager.desert.320: "We need a stable for the horses we don\u2019\
  t have yet."
database.dialogues.villager.desert.224: "It\u2019s a good day to do nothing in the\
  \ sun."
database.dialogues.villager.desert.332: Could use some stairs on that dune trail.
  My knees, man.
database.dialogues.villager.desert.330: How about a little marketplace with some shade?
database.dialogues.villager.desert.105: "No water? No problem. Just kidding, it\u2019\
  s a big problem."
database.dialogues.villager.desert.103: Oh look, another heatstroke victim with a
  sword.
database.dialogues.villager.desert.234: I saw a baby husk do a dance once. Terrifying,
  but cute.
database.dialogues.villager.desert.235: The stars here tell the best bedtime stories.
database.dialogues.villager.desert.236: Sunset tea? It is just hot water and dreams.
database.dialogues.villager.desert.237: "Yes, we have parties. No, you\u2019re not\
  \ invited. Yet."
database.dialogues.villager.desert.345: Build a tiny museum for all our cool junk.
database.dialogues.villager.desert.341: We need a gate that looks cool but scares
  pillagers.
database.dialogues.villager.desert.138: "The cactus told me your future. It wasn\u2019\
  t good."
database.dialogues.villager.desert.201: Sometimes the wind makes a song just for me.
database.dialogues.villager.desert.221: We trade stories as often as emeralds.
database.dialogues.villager.desert.114: Stay out of the temple. It bites back.
database.dialogues.villager.desert.222: "Have you ever hugged a cactus? You shouldn\u2019\
  t, but I have."
database.dialogues.villager.desert.225: "The husks don\u2019t bite if you wink first.\
  \ Kidding."
database.dialogues.villager.desert.226: "I\u2019ve made peace with the sun. We high-five\
  \ daily."
database.dialogues.villager.desert.202: "Want to race a rabbit? They\u2019re fast\
  \ but friendly."
database.dialogues.villager.desert.119: Another stranger with big dreams and no water.
database.dialogues.villager.desert.118: The desert gives nothing for free.
database.dialogues.villager.desert.310: A fishing spot by the water would be real
  nice.
database.dialogues.villager.desert.346: Could you set up a bell on every corner? Just
  to be safe.
database.dialogues.villager.desert.113: Even the rabbits are hostile here.
database.dialogues.villager.desert.342: Can you make a tiny shrine to the wandering
  trader?
database.dialogues.villager.desert.117: You ever seen a golem cry? Neither have I.
  Yet.
database.dialogues.villager.desert.115: "You smell like the Nether. That\u2019s not\
  \ a compliment."
database.dialogues.villager.desert.344: Add some flowerpots. Empty windows are boring.
database.dialogues.villager.desert.259: The desert forgets the weak. And sometimes
  the strong.
database.dialogues.villager.desert.257: He who plants in sand believes in miracles.
database.dialogues.villager.desert.258: The wind will always tell the truth.
database.dialogues.villager.desert.256: Even the sun must rest eventually.
database.dialogues.villager.desert.340: "Make us a map room. I like knowing where\
  \ I\u2019m not going."
database.dialogues.villager.desert.124: "Don\u2019t let the breeze fool you. It\u2019\
  s mocking you."
database.dialogues.villager.desert.311: Build me a bench! Standing all day is rough
  work.
database.dialogues.villager.desert.228: My best friend is a rock. Reliable guy.
database.dialogues.villager.desert.323: Could you add some banners? The place looks
  plain.
database.dialogues.villager.desert.268: "My neighbor vanished. His bed\u2019s still\
  \ warm."
database.dialogues.villager.desert.220: "Water\u2019s rare. Laughter? Less so."
database.dialogues.villager.desert.243: The desert asks nothing, yet teaches everything.
database.dialogues.villager.desert.204: That cactus over there? I named him Steve.
database.dialogues.villager.desert.149: "Careful where you step. That\u2019s our sacred\
  \ gravel."
database.dialogues.villager.desert.137: "Don\u2019t follow the rabbits. Seriously."
database.dialogues.villager.desert.147: Sunburns are our natural armor.
database.dialogues.villager.desert.336: Can you dig out a tunnel to the mines? Safer
  than outside.
database.dialogues.villager.desert.101: "The sun hasn\u2019t set in my soul for years."
database.dialogues.villager.desert.334: The golem wants a house too, probably.
database.dialogues.villager.desert.230: We turn boredom into creativity.
database.dialogues.villager.desert.135: "The sun doesn\u2019t rise here. It attacks."
database.dialogues.villager.desert.232: My favorite sound is cactus pops.
database.dialogues.villager.desert.238: Ever met a desert poet? You just did.
database.dialogues.villager.desert.279: The wind brought voices again.
database.dialogues.villager.desert.107: You call that armor? Cute.
database.dialogues.villager.desert.158: "Llamas won\u2019t survive long here. Just\
  \ like optimism."
database.dialogues.villager.desert.109: The cacti here have better personalities than
  some travelers.
database.dialogues.villager.desert.321: I could use a tiny shack near the mines.
database.dialogues.villager.desert.126: This place builds character. Mostly broken
  ones.
database.dialogues.villager.desert.325: "Put up some signs\u2014we keep getting lost\
  \ in our own town."
database.dialogues.villager.desert.122: The stars here are too close for comfort.
database.dialogues.villager.desert.241: "Silence is the desert\u2019s deepest wisdom."
database.dialogues.villager.desert.249: What thrives here has learned to bend, not
  break.
database.dialogues.villager.desert.266: "That sand pile wasn\u2019t here yesterday."
database.dialogues.villager.desert.245: The desert does not rush. Why should we?
database.dialogues.villager.desert.300: Could you build me a cactus fence to keep
  the mobs out?
database.dialogues.villager.desert.217: "I\u2019ve got a cactus farm and an attitude."
database.dialogues.villager.desert.219: Sun hats are fashion and survival.
database.dialogues.villager.desert.302: Can you make a proper path to the well? My
  feet hurt.
database.dialogues.villager.desert.211: Sometimes I roll in the sand. No shame.
database.dialogues.villager.desert.215: "The rabbits dance at night. It\u2019s a vibe."
database.dialogues.villager.desert.213: My roof is open sky and good vibes.
database.dialogues.villager.desert.132: You brought a bed? You poor, naive soul.
database.dialogues.villager.desert.144: Our pets are scorpions. Invisible ones.
database.dialogues.villager.desert.303: A nice little farm would sure help us around
  here.
database.dialogues.villager.desert.315: Could you patch that hole? The wind howls
  like a ghast!
database.dialogues.villager.desert.208: Need a smile? Watch our golem trip over a
  beetroot.
database.dialogues.villager.desert.156: We measure value in cactus flesh and tears.
database.dialogues.villager.desert.264: "Don\u2019t trust shadows that move."
database.dialogues.villager.desert.288: "I\u2019ve trained a rabbit to dance. He\u2019\
  s shy."
database.dialogues.villager.desert.120: I traded my last joy for a saddle.
database.dialogues.villager.desert.287: "My bed levitates. Don\u2019t worry about\
  \ it."
database.dialogues.villager.desert.143: "You look like you\u2019ve never met a husk.\
  \ Yet."
database.dialogues.villager.desert.133: "My house? It\u2019s made of hard-earned dust."
database.dialogues.villager.desert.326: "Build a little altar\u2014we\u2019ve got\
  \ spirits to thank."
database.dialogues.villager.desert.209: I love when the husks walk into cactus. Comedy
  gold.
database.dialogues.villager.desert.276: You hear that heartbeat? Not yours.
database.dialogues.villager.desert.277: "A shadow passed me at noon. It wasn\u2019\
  t mine."
database.dialogues.villager.desert.338: "We need a brewing hut\u2014strictly for potions,\
  \ I swear."
database.dialogues.villager.desert.110: Need a trade or just lost again?
database.dialogues.villager.desert.166: You brought redstone here? Cute.
database.dialogues.villager.desert.205: We host sandcastle contests every new moon.
database.dialogues.villager.desert.349: Build something weird. Surprise me.
database.dialogues.villager.desert.348: Give the well a makeover. Maybe with glowstone?
database.dialogues.villager.desert.284: The beetroot whispers secrets.
database.dialogues.villager.desert.167: Even my shadow left me.
database.dialogues.villager.desert.314: Think you can raise the walls a bit? Husks
  keep peeking in.
database.dialogues.villager.desert.250: Hunger sharpens more than swords.
database.dialogues.villager.desert.253: Not all treasures glitter. Some grow.
database.dialogues.villager.desert.254: Doubt dries quicker than water here.
database.dialogues.villager.desert.319: "Build a bridge over the river\u2014I'm tired\
  \ of swimming with drowned."
database.dialogues.villager.desert.318: I want a sandcastle. Yes, a real one.
database.dialogues.villager.desert.136: Every block here screams. Quietly.
database.dialogues.villager.desert.295: You ever meet a sentient tumbleweed? Lucky
  you.
database.dialogues.villager.desert.148: You mine diamonds, I mine reasons to care.
database.dialogues.villager.desert.227: We throw sandballs for fun. Just duck fast.
database.dialogues.villager.desert.140: Try not to die. It messes with the vibe.
database.dialogues.villager.desert.307: Hey, can you build a bell tower? Ours got
  creepered.
database.dialogues.villager.desert.322: "Some storage huts would help\u2014we got\
  \ stuff everywhere!"
database.dialogues.villager.desert.239: "I make sand soup. It\u2019s bad, but I\u2019\
  m proud."
database.dialogues.villager.desert.189: We celebrate silence. It means no mobs.
database.dialogues.villager.desert.272: If the cactus flowers, run.
database.dialogues.villager.desert.231: Ever raced a tumbleweed? I lost.
database.dialogues.villager.desert.174: We named the husks. It helps us scream at
  them.
database.dialogues.villager.desert.333: "Build me a secret room. You didn\u2019t hear\
  \ that."
database.dialogues.villager.desert.102: Did you seriously just try to plant wheat
  here?
database.dialogues.villager.desert.337: What if you made a tower? Just a really tall
  one.
database.dialogues.villager.desert.106: The sand whispers, but only I understand it.
database.dialogues.villager.desert.178: "I don\u2019t fear the dark. I fear the sand\
  \ that moves in it."
database.dialogues.villager.desert.269: When the stars blink, I hide.
database.dialogues.villager.desert.261: We lost a traveler in the temple. Still hear
  him scream.
database.dialogues.villager.desert.246: The path is never straight, just sandy.
database.dialogues.villager.desert.181: The temple? Yeah. It explodes sometimes.
database.dialogues.villager.desert.242: Heat burns away all lies.
database.dialogues.villager.desert.185: Another map. Another waste of paper.
database.dialogues.villager.desert.265: "Our well\u2019s deep enough to hold regrets."
database.dialogues.villager.desert.121: Ever tried baking bread at 120 degrees? Easy.
database.dialogues.villager.desert.159: "No one cries in the desert. It\u2019s too\
  \ dry."
database.dialogues.villager.desert.155: "You touch my composter, we\u2019re enemies."
database.dialogues.villager.desert.125: "Heard your stomach growl. That\u2019s adorable."
database.dialogues.villager.desert.212: "Who needs oceans when you\u2019ve got endless\
  \ dunes?"
database.dialogues.villager.desert.216: I saw a mirage once. It complimented me.
database.dialogues.villager.desert.299: I buried my past. Literally. Out back.
database.dialogues.villager.desert.129: "We measure time in how many mobs you\u2019\
  ve outlived."
database.dialogues.villager.desert.151: "Don\u2019t dig under the well. Just\u2026\
  \ don\u2019t."
database.dialogues.villager.savanna.291: "My nose twitches when danger\u2019s near.\
  \ It\u2019s always twitching."
database.dialogues.villager.savanna.183: "The wind whispers \u2018move\u2019\u2026\
  \ but I can\u2019t."
database.dialogues.villager.savanna.184: My crops vanished. So did my will.
database.dialogues.villager.savanna.160: I had a llama once. She left me.
database.dialogues.villager.savanna.170: Even the golem wants to leave.
database.dialogues.villager.savanna.171: "This isn\u2019t dirt. It\u2019s future disappointment."
database.dialogues.villager.savanna.173: "Every sunrise just reminds me I\u2019m still\
  \ here."
database.dialogues.villager.savanna.172: My scarecrow ran away.
database.dialogues.villager.savanna.281: "I saw the End once. Still can\u2019t unsee\
  \ it."
database.dialogues.villager.savanna.198: "I envy the drowned. At least they\u2019\
  re cool."
database.dialogues.villager.savanna.161: "Your cape doesn\u2019t make you a hero here."
database.dialogues.villager.savanna.162: You ever seen a spider sunbathe? I have.
  It haunts me.
database.dialogues.villager.savanna.280: "No, I don\u2019t want to hear about your\
  \ \u2018builds.\u2019"
database.dialogues.villager.savanna.282: "I\u2019ll trade you six sighs for a baked\
  \ potato."
database.dialogues.villager.savanna.194: Go ahead, take my wheat. Everyone else has.
database.dialogues.villager.savanna.199: "Stay a night, they said. It'll be fun, they\
  \ said\u2026"
database.dialogues.villager.savanna.195: This biome was born from lava and sarcasm.
database.dialogues.villager.savanna.196: "The nether\u2019s more welcoming than this\
  \ place."
database.dialogues.villager.savanna.197: Why farm when creepers do the harvesting?
database.dialogues.villager.savanna.192: Every emerald costs me a memory.
database.dialogues.villager.savanna.193: Once I saw a flower bloom. Once.
database.dialogues.villager.savanna.283: "Don\u2019t worry, we accept all forms of\
  \ pain here."
database.dialogues.villager.savanna.188: Our well is deep. So is my discontent.
database.dialogues.villager.savanna.271: "Ever hugged a creeper? Me neither, but I\u2019\
  m curious."
database.dialogues.villager.savanna.180: Lightning struck my house. I called it a
  blessing.
database.dialogues.villager.savanna.163: "There\u2019s no endgame in the savanna\u2014\
  just heat."
database.dialogues.villager.savanna.308: "Let\u2019s build a big central fire pit\
  \ for storytelling nights."
database.dialogues.villager.savanna.260: I traded my bed for a boat. Still a bad deal.
database.dialogues.villager.savanna.177: Villagers in plains have it easy. They have
  grass.
database.dialogues.villager.savanna.175: Acacia is life. Accept it.
database.dialogues.villager.savanna.273: "You\u2019re not from around here. You smell\
  \ too\u2026 wet."
database.dialogues.villager.savanna.154: "If you break another door, I swear\u2026"
database.dialogues.villager.savanna.182: Only thing we trade in now is sarcasm.
database.dialogues.villager.savanna.186: "I once had a farm. Now it\u2019s an enderman\
  \ hangout."
database.dialogues.villager.savanna.329: Build me a cozy nook to read maps and stare
  at clouds.
database.dialogues.villager.savanna.306: I want a bigger porch so I can nap in the
  breeze.
database.dialogues.villager.savanna.294: I once had hope. Then I joined this server.
database.dialogues.villager.savanna.296: You call that a portal? Amateur.
database.dialogues.villager.savanna.290: "Trade? Sure. I\u2019ll take your will to\
  \ live."
database.dialogues.villager.savanna.304: Could you build a proper road through the
  tall grass?
database.dialogues.villager.savanna.292: Ever stared at the sun until it blinked first?
database.dialogues.villager.savanna.150: The bell tolls for someone. Probably me.
database.dialogues.villager.savanna.152: Even the sheep are angry now.
database.dialogues.villager.savanna.298: "That\u2019s not redstone\u2014it\u2019s\
  \ villager tears."
database.dialogues.villager.savanna.263: "I had a twin. He joined the Illagers. We\
  \ don\u2019t talk."
database.dialogues.villager.savanna.251: Every night I dream of emeralds. And explosions.
database.dialogues.villager.savanna.168: "We don\u2019t build walls. We dig holes\
  \ to hide in."
database.dialogues.villager.savanna.328: "A food stand would be nice\u2014roasted\
  \ beetroot, anyone?"
database.dialogues.villager.savanna.327: I need a smokehouse, even if I just burn
  grass.
database.dialogues.villager.savanna.207: Ever eaten dried kelp for a week? I have
  questions.
database.dialogues.villager.savanna.274: If you break it, you place it. And you explain
  it.
database.dialogues.villager.savanna.179: This biome eats dreams.
database.dialogues.villager.savanna.262: You want XP? Earn it, scrub.
database.dialogues.villager.savanna.145: I envy the wandering trader. At least he
  wanders.
database.dialogues.villager.savanna.275: My legs are cubes. My pain is not.
database.dialogues.villager.savanna.131: I once had 12 pigs. Now I have silence.
database.dialogues.villager.savanna.339: Can we build a shrine to the wandering trader?
  Just in case.
database.dialogues.villager.savanna.130: "You brought phantoms, didn\u2019t you?"
database.dialogues.villager.savanna.134: "Your enchanted pants won\u2019t impress\
  \ me."
database.dialogues.villager.savanna.285: The cats stole my fish. Again.
database.dialogues.villager.savanna.206: Once I tried to fish. Caught sand.
database.dialogues.villager.savanna.146: "You brought a jukebox? We don\u2019t dance\
  \ here."
database.dialogues.villager.savanna.313: "Can you plant a few trees? Savanna\u2019\
  s pretty, but shady it ain\u2019t."
database.dialogues.villager.savanna.289: "It\u2019s not a village if no one\u2019\
  s screaming."
database.dialogues.villager.savanna.141: "Stop looking in my chest. That\u2019s private\
  \ hay."
database.dialogues.villager.savanna.142: "If you\u2019re looking for joy, dig deeper."
database.dialogues.villager.savanna.286: Sometimes I dig for fun. Usually I regret
  it.
database.dialogues.villager.savanna.111: You brought a goat here? WHY?
database.dialogues.villager.savanna.169: "I once saw a raid wipe out an entire village\u2026\
  \ oh wait, that was this one."
database.dialogues.villager.savanna.252: Build us a wall, traveler. Or at least a
  fence.
database.dialogues.villager.savanna.165: "If I had redstone, I\u2019d make a sadness\
  \ machine."
database.dialogues.villager.savanna.312: A windmill would look real good out here.
database.dialogues.villager.savanna.229: "The acacia trees whisper when you\u2019\
  re not looking."
database.dialogues.villager.savanna.191: "You\u2019re lucky you have fast travel.\
  \ We have slow despair."
database.dialogues.villager.savanna.190: "Don\u2019t mine at night. Don\u2019t trade\
  \ at night. Don\u2019t be here at night."
database.dialogues.villager.savanna.316: I want a goat pen. No goats yet, but soon.
database.dialogues.villager.savanna.317: "A raised walkway would help\u2014those grass\
  \ blocks are uneven."
database.dialogues.villager.savanna.255: "We\u2019re not lost. We\u2019re just\u2026\
  \ very stationary."
database.dialogues.villager.savanna.335: Could you lay down some paths between the
  huts?
database.dialogues.villager.savanna.112: "Ever try to hoe dry dirt? It\u2019s an emotional\
  \ experience."
database.dialogues.villager.savanna.100: The sun bakes my crops and my soul alike.
database.dialogues.villager.savanna.347: Build a giant acacia tree. Just for show.
database.dialogues.villager.savanna.176: "We don\u2019t sing. We grunt in key."
database.dialogues.villager.savanna.164: My kids learned to sprint before they could
  craft.
database.dialogues.villager.savanna.267: "Don\u2019t eat raw chicken. Learned that\
  \ the hard way."
database.dialogues.villager.savanna.244: A creeper ruined my house and my week.
database.dialogues.villager.savanna.203: "If you\u2019re looking for shade, try another\
  \ village."
database.dialogues.villager.savanna.270: The wind once stole my hat. I never forgave
  it.
database.dialogues.villager.savanna.324: "Let\u2019s get a gathering spot in the middle\
  \ of town."
database.dialogues.villager.savanna.187: Even the donkeys look tired here.
database.dialogues.villager.savanna.233: "Don\u2019t dig near the hill. It\u2019s\
  \ cursed. Ask no more."
database.dialogues.villager.savanna.108: "Go ahead, sleep in my bed\u2026 again."
database.dialogues.villager.savanna.278: "Every day\u2019s a furnace in this place."
database.dialogues.villager.savanna.293: You think this is hard? Try spawning here.
database.dialogues.villager.savanna.218: You smell like the Nether.
database.dialogues.villager.savanna.301: "I\u2019d love a tall watchtower\u2014flat\
  \ land makes it easy to spot trouble."
database.dialogues.villager.savanna.309: Build a little lookout hut on that hill over
  there.
database.dialogues.villager.savanna.305: "A watering hole would be nice\u2014just\
  \ for vibes."
database.dialogues.villager.savanna.123: "That\u2019s not a hat. That\u2019s my profession."
database.dialogues.villager.savanna.127: "You know what doesn\u2019t grow in the savanna?\
  \ Hope."
database.dialogues.villager.savanna.157: "There\u2019s no magic here, only sand and\
  \ pain."
database.dialogues.villager.savanna.240: Why do you smell like gunpowder and regret?
database.dialogues.villager.savanna.210: I once made a redstone lamp. Then it exploded.
database.dialogues.villager.savanna.153: I saw Herobrine. Or maybe it was just heatstroke.
database.dialogues.villager.savanna.297: Every raid leaves a scar. Most are emotional.
database.dialogues.villager.savanna.214: "I saw you looking at our pigs. Don\u2019\
  t."
database.dialogues.villager.savanna.128: "I can\u2019t remember the last time it rained."
database.dialogues.villager.savanna.343: A nice stone arch at the village entrance
  would be classy.
database.dialogues.villager.savanna.116: You think gold is rare? Try peace.
database.dialogues.villager.savanna.331: "Let\u2019s build an acacia gate that looks\
  \ really fancy."
database.dialogues.villager.savanna.248: "You know what\u2019s fun? Silence. Try it."
database.dialogues.villager.savanna.104: Trade? Only if you brought emeralds and respect.
database.dialogues.villager.savanna.247: Go ahead. Ring the bell. See what happens.
database.dialogues.villager.savanna.223: That chest has nothing. Just broken promises.
database.dialogues.villager.savanna.200: Did you just punch my cow?
database.dialogues.villager.savanna.139: "Don\u2019t punch the golem unless you want\
  \ a fast trip to spawn."
database.dialogues.villager.savanna.320: Can you build a training ring? Iron golem
  needs a hobby.
database.dialogues.villager.savanna.224: "Want to trade? I\u2019ve got disappointment\
  \ in bulk."
database.dialogues.villager.savanna.332: I want a tower made of every kind of log.
  Why not?
database.dialogues.villager.savanna.330: Can you set up a cactus barrier? Just for
  style.
database.dialogues.villager.savanna.105: I saw a witch once. Still recovering.
database.dialogues.villager.savanna.103: "This isn\u2019t a village\u2014it\u2019\
  s a skeleton buffet."
database.dialogues.villager.savanna.234: "The sheep? Yeah, they\u2019re planning something."
database.dialogues.villager.savanna.235: My cousin became a cartographer. We never
  saw him again.
database.dialogues.villager.savanna.236: You call that a sword? Cute.
database.dialogues.villager.savanna.237: Every emerald has a story. Mine are mostly
  sad.
database.dialogues.villager.savanna.345: "We need a bell post that doesn\u2019t fall\
  \ every creeper night."
database.dialogues.villager.savanna.341: Can you make my house look less like a box?
database.dialogues.villager.savanna.138: "I\u2019d fish, but the water tastes like\
  \ regret."
database.dialogues.villager.savanna.201: Rain? Never heard of it.
database.dialogues.villager.savanna.221: I used to believe in heroes. Then you came
  along.
database.dialogues.villager.savanna.114: Leave my melons alone, wanderer.
database.dialogues.villager.savanna.222: Even my pickaxe is tired.
database.dialogues.villager.savanna.225: "If you take one more hay bale, I\u2019m\
  \ calling the golem."
database.dialogues.villager.savanna.226: "Sometimes I pretend I\u2019m a tree. It\u2019\
  s relaxing."
database.dialogues.villager.savanna.202: "I trade beets for emeralds. It\u2019s not\
  \ a great life, but it\u2019s mine."
database.dialogues.villager.savanna.119: "If I had a totem every time I got ignored\u2026"
database.dialogues.villager.savanna.118: "The iron golem won\u2019t protect you from\
  \ me."
database.dialogues.villager.savanna.310: "I need a bigger crop field\u2014my wheat\u2019\
  s jealous of the grass."
database.dialogues.villager.savanna.346: "Could you set up a dance floor? Flat land\u2019\
  s perfect for it!"
database.dialogues.villager.savanna.113: This biome is cursed. The cats know it.
database.dialogues.villager.savanna.342: "Let\u2019s build a clay oven or something\u2014\
  get that rustic feel."
database.dialogues.villager.savanna.117: "Stop ringing the bell. You\u2019re scaring\
  \ the elders."
database.dialogues.villager.savanna.115: I used to farm. Now I fear the night.
database.dialogues.villager.savanna.344: "I\u2019d love a bench under that lone tree.\
  \ You know the one."
database.dialogues.villager.savanna.259: My house has four walls and no joy.
database.dialogues.villager.savanna.257: "You mine it, you place it. That\u2019s the\
  \ rule."
database.dialogues.villager.savanna.258: Want to know the secret of the acacia? Too
  bad.
database.dialogues.villager.savanna.256: "I once kissed a frog. Didn\u2019t become\
  \ a prince, just got warts."
database.dialogues.villager.savanna.340: Make me a water tower. It doesn't have to
  work.
database.dialogues.villager.savanna.124: One more llama spit and I riot.
database.dialogues.villager.savanna.311: "Can you put up a wall? Hyenas\u2014uh, zombies\u2014\
  are getting too close."
database.dialogues.villager.savanna.228: "One day, I\u2019ll escape\u2026 maybe tomorrow."
database.dialogues.villager.savanna.323: I want a deck where I can watch the sun set.
database.dialogues.villager.savanna.268: Do I look like a guy with extra beds?
database.dialogues.villager.savanna.220: You ever seen a creeper do a cartwheel? Me
  neither, but I dream about it.
database.dialogues.villager.savanna.243: "My chickens have names. Don\u2019t ask what\
  \ they are."
database.dialogues.villager.savanna.204: "This robe? Custom\u2026 made by accident."
database.dialogues.villager.savanna.149: My job block? Stolen. Again.
database.dialogues.villager.savanna.137: Another day, another creeper in the fields.
database.dialogues.villager.savanna.147: "You think it\u2019s hard surviving? Try\
  \ farming on dust."
database.dialogues.villager.savanna.336: "A little arena for games would be fun\u2014\
  pig races?"
database.dialogues.villager.savanna.101: "Stolen again\u2026 third creeper this week."
database.dialogues.villager.savanna.334: We need a hill fort. For looks. (And pillagers.)
database.dialogues.villager.savanna.230: Oh, another traveler. How original.
database.dialogues.villager.savanna.135: This is acacia country. Learn to love orange.
database.dialogues.villager.savanna.232: My dreams are square, and so is my luck.
database.dialogues.villager.savanna.238: Got any string? I owe the cat mafia.
database.dialogues.villager.savanna.279: My hobbies include staring and not dying.
database.dialogues.villager.savanna.107: "It\u2019s hot. Like nether-hot."
database.dialogues.villager.savanna.158: Even the creepers look bored.
database.dialogues.villager.savanna.109: I had dreams once. Then the pillagers came.
database.dialogues.villager.savanna.321: "I\u2019d like a tall flagpole. Gotta mark\
  \ our territory!"
database.dialogues.villager.savanna.126: We had a cleric. He joined the Illagers.
database.dialogues.villager.savanna.325: How about a stable? These plains beg for
  horses.
database.dialogues.villager.savanna.122: Go ahead. Build another portal near our village.
database.dialogues.villager.savanna.241: "We don\u2019t talk about the ravager incident."
database.dialogues.villager.savanna.249: That potion smells like doom.
database.dialogues.villager.savanna.266: "No, I\u2019m not lost. This is where I cry\
  \ every morning."
database.dialogues.villager.savanna.245: I saw a trader ride a llama into lava. Beautiful.
database.dialogues.villager.savanna.300: "Can you build me a shady hut? The sun\u2019\
  s cooking my crops!"
database.dialogues.villager.savanna.217: My kid says he wants to be a blaze. I support
  him.
database.dialogues.villager.savanna.219: "Golems don\u2019t forget. Neither do I."
database.dialogues.villager.savanna.302: "Mind fixing my roof? Acacia planks don\u2019\
  t last forever, y\u2019know."
database.dialogues.villager.savanna.211: Call this a farm? More like an accident with
  seeds.
database.dialogues.villager.savanna.215: Careful, traveler. The llamas spit first,
  ask later.
database.dialogues.villager.savanna.213: "The stonecutter watches us. Don\u2019t ask\
  \ why."
database.dialogues.villager.savanna.132: If you want a deal, you better bring carrots.
database.dialogues.villager.savanna.144: The acacia planks whisper at night.
database.dialogues.villager.savanna.303: "We need a fenced pen\u2014my livestock keep\
  \ wandering off."
database.dialogues.villager.savanna.315: Build me a stall to sell my melons, please!
database.dialogues.villager.savanna.208: Hey, no tools in the crops, okay?
database.dialogues.villager.savanna.156: You think emeralds grow on trees? WRONG biome.
database.dialogues.villager.savanna.264: Put that block back. Now.
database.dialogues.villager.savanna.288: "Even the water here\u2019s sarcastic."
database.dialogues.villager.savanna.120: Even the wandering trader looks down on us.
database.dialogues.villager.savanna.287: You bring nothing but footsteps and dust.
database.dialogues.villager.savanna.143: My father was a mason. He died building that
  ugly path.
database.dialogues.villager.savanna.133: "We don\u2019t trade with people wearing\
  \ skulls."
database.dialogues.villager.savanna.326: Can you dig out a cool cave spot beneath
  my house?
database.dialogues.villager.savanna.209: You ever hear an enderman cry? Chilling.
database.dialogues.villager.savanna.276: "Don\u2019t feed the cows sugarcane. It gets\
  \ weird."
database.dialogues.villager.savanna.277: Who needs diamonds when you have bitter sarcasm?
database.dialogues.villager.savanna.338: "I want a raised garden\u2014tired of creepers\
  \ in my carrots."
database.dialogues.villager.savanna.110: "No, I don\u2019t want to be a librarian.\
  \ Stop placing lecterns."
database.dialogues.villager.savanna.166: "The cats here don\u2019t purr. They hiss\
  \ truths."
database.dialogues.villager.savanna.205: "Go ahead. Sleep here. We\u2019ll just watch."
database.dialogues.villager.savanna.349: Surprise me! Just make it orange, dry, and
  a little dramatic.
database.dialogues.villager.savanna.348: "Make a map board\u2014we keep walking in\
  \ circles."
database.dialogues.villager.savanna.284: This well is dry. Like my humor.
database.dialogues.villager.savanna.167: "Yes, the ground\u2019s cracked. So is my\
  \ spirit."
database.dialogues.villager.savanna.314: "I need a shed for tools\u2014and maybe a\
  \ snack stash."
database.dialogues.villager.savanna.250: "You ever feel like you\u2019re being watched?\
  \ You are."
database.dialogues.villager.savanna.253: "That isn\u2019t a hat. It\u2019s a job title."
database.dialogues.villager.savanna.254: Why are you squatting like that? Is that
  a thing?
database.dialogues.villager.savanna.319: Add a rain catcher. Yes, I know it never
  rains here.
database.dialogues.villager.savanna.318: Can we get some lanterns up? Night gets real
  weird.
database.dialogues.villager.savanna.136: Even the cacti look tired.
database.dialogues.villager.savanna.295: Even my shadow looks tired.
database.dialogues.villager.savanna.148: This biome is where armor goes to rust.
database.dialogues.villager.savanna.227: "The bees know things. Don\u2019t mess with\
  \ them."
database.dialogues.villager.savanna.140: Sleep? Only if the zombies let me.
database.dialogues.villager.savanna.307: Can you raise my house a little? Termites
  are getting bold.
database.dialogues.villager.savanna.322: Build a hill shrine. Something cool with
  leaves and stone.
database.dialogues.villager.savanna.239: "This isn\u2019t a village. It\u2019s a training\
  \ ground for suffering."
database.dialogues.villager.savanna.189: Wanna build? Bring your own blocks.
database.dialogues.villager.savanna.272: This robe? Inherited. From someone who vanished.
database.dialogues.villager.savanna.231: You think you know pain? Try sleeping through
  phantoms.
database.dialogues.villager.savanna.174: Go mine somewhere else, trespasser.
database.dialogues.villager.savanna.333: Build a drum circle! Gotta keep the spirits
  entertained.
database.dialogues.villager.savanna.102: If you touch my composter, I will scream.
database.dialogues.villager.savanna.337: Add a row of flags to make the village feel
  grand.
database.dialogues.villager.savanna.106: My cow wandered off and joined a raid. Brave
  fool.
database.dialogues.villager.savanna.178: "Yes, I\u2019m wearing the same robe. No,\
  \ I don\u2019t care."
database.dialogues.villager.savanna.269: "The hay tastes better when you\u2019re not\
  \ crying."
database.dialogues.villager.savanna.261: "The sky\u2019s been orange for ten years.\
  \ No one questions it."
database.dialogues.villager.savanna.246: "Life\u2019s just sand, sleep, and sorrow."
database.dialogues.villager.savanna.181: I named my pickaxe 'Hope'. It broke yesterday.
database.dialogues.villager.savanna.242: "No, I don\u2019t want to follow you. Ever."
database.dialogues.villager.savanna.185: "That bell doesn\u2019t mean salvation\u2014\
  it means hide."
database.dialogues.villager.savanna.265: "I can\u2019t read, but I know you\u2019\
  re trouble."
database.dialogues.villager.savanna.121: My hut has more sand than bed now.
database.dialogues.villager.savanna.159: Trade? I only deal in sighs now.
database.dialogues.villager.savanna.155: "No, I don\u2019t want to follow you to your\
  \ base."
database.dialogues.villager.savanna.125: Sunrise. Again. Joyless as ever.
database.dialogues.villager.savanna.212: "We have one rule here: don\u2019t dig straight\
  \ down. Everyone ignores it."
database.dialogues.villager.savanna.216: "The cactus told me your fortune. It\u2019\
  s not good."
database.dialogues.villager.savanna.299: "If you\u2019re gonna grief, at least be\
  \ creative about it."
database.dialogues.villager.savanna.129: Is this even a well or just a dry hole of
  despair?
database.dialogues.villager.savanna.151: "We don\u2019t get snow here, just regret."
